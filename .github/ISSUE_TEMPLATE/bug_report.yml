name: Bug Report
description: Report a bug in InfraDocs Generator
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug!
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug
      placeholder: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Run `infradocs init test`
        2. Edit ...
        3. Run `infradocs build ...`
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: What version of InfraDocs are you using?
      placeholder: e.g., 1.0.0
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python Version
      placeholder: e.g., 3.11.0
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Windows
        - macOS
        - Linux
        - Other
